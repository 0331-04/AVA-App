        with:
          context: ./main/claims
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ava-claims:latest
      - name: Save SHA to cache
        uses: actions/cache/save@v4
        with:
          path: .last-shas
          key: last-shas-claims-${{ needs.poll.outputs.claims_sha }}
  # claims-deploy: (uncomment when server ready)


  # MODULE 6 — cost-estimation  (Python Flask | port 5001)

  cost-estimation:
    name: 💰 cost-estimation — Test & Build
    runs-on: ubuntu-latest
    needs: poll
    if: needs.poll.outputs.cost_estimation == 'true' || github.event.inputs.run_cost_estimation == 'true'
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main
      - name: Checkout cicd branch (Dockerfiles)
        uses: actions/checkout@v4
        with:
