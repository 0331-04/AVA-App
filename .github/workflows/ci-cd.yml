      - name: Install dependencies
        working-directory: main/cost-estimation
        run: pip install -r requirements.txt
      - name: Lint with flake8
        working-directory: main/cost-estimation
        run: pip install flake8 && flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Run tests
        working-directory: main/cost-estimation
        env:
          FLASK_ENV: testing
        run: pip install pytest && pytest tests/ -v --tb=short
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./main/cost-estimation
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ava-cost-estimation:latest
      - name: Save SHA to cache
