  quality-service:
    name: ✅ quality-service — Test & Build
    runs-on: ubuntu-latest
    needs: poll
    if: needs.poll.outputs.quality_service == 'true' || github.event.inputs.run_quality_service == 'true'
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main
      - name: Checkout cicd branch (Dockerfiles)
