          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ava-damage-detection:latest
      - name: Save SHA to cache
        uses: actions/cache/save@v4
        with:
          path: .last-shas
          key: last-shas-damage_detection-${{ needs.poll.outputs.damage_detection_sha }}
  # damage-detection-service-deploy: (uncomment when server ready)



