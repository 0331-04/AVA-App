  backend-claims:
    name: 📋 backend-claims — Test & Build
    runs-on: ubuntu-latest
    needs: poll
    if: needs.poll.outputs.backend_claims == 'true' || github.event.inputs.run_backend_claims == 'true'
    services:
      mongodb:
        image: mongo:6
        ports: [27017:27017]
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main
      - name: Checkout cicd branch (Dockerfiles)
        uses: actions/checkout@v4
        with:
          ref: cicd
          path: cicd
      - name: Copy Dockerfile
        run: cp cicd/dockerfiles/backend-claims/Dockerfile main/backend-claims/Dockerfile
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: main/backend-claims/package-lock.json
      - name: Install dependencies
        working-directory: main/backend-claims
        run: npm ci
      - name: Run tests
        working-directory: main/backend-claims
        env:
          NODE_ENV: test
          PORT: 3001
          MONGODB_URI: mongodb://localhost:27017/ava-claims-test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          DAMAGE_DETECTION_API: http://localhost:5000/analyze
        run: npm test
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./main/backend-claims
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ava-backend-claims:latest
