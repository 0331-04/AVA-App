          cache-dependency-path: main/backend-notifications/package-lock.json
      - name: Install dependencies
        working-directory: main/backend-notifications
        run: npm ci
      - name: Write Firebase service account
        working-directory: main/backend-notifications
        run: |
          mkdir -p src/config
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > src/config/firebase-service-account.json
      - name: Run tests
        working-directory: main/backend-notifications
        env:
          NODE_ENV: test
          PORT: 3002
          MONGODB_URI: mongodb://localhost:27017/ava-notifications-test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: npm test
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./main/backend-notifications
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ava-backend-notifications:latest
      - name: Save SHA to cache
        uses: actions/cache/save@v4
        with:
          path: .last-shas
          key: last-shas-backend_notifications-${{ needs.poll.outputs.backend_notifications_sha }}
  # backend-notifications-deploy: (uncomment when server ready)



  # MODULE 5 — claims  (Node.js | port 3003)

  claims:
