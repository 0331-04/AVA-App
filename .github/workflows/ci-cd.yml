name: AVA Backend — CI/CD

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      run_ai_analysis:
        description: 'Force run ai-analysis?'
        type: boolean
        default: false
      run_authentication:
        description: 'Force run authentication?'
        type: boolean
        default: false
      run_backend_claims:
        description: 'Force run backend-claims?'
        type: boolean
        default: false
      run_backend_notifications:
        description: 'Force run backend-notifications?'
        type: boolean
        default: false
      run_claims:
        description: 'Force run claims?'
        type: boolean
        default: false
      run_cost_estimation:
        description: 'Force run cost-estimation?'
        type: boolean
        default: false
      run_damage_detection:
        description: 'Force run damage-detection-service?'
        type: boolean
        default: false
      run_quality_service:
        description: 'Force run quality-service?'
        type: boolean
        default: false

jobs:

  # JOB 0 — Poll main for changes
  # Reads last saved SHAs from cache, fetches current SHAs from GitHub API,
  # sets changed=true/false per module. Does NOT save SHAs here —
  # each module saves its own SHA only after a successful build.

  poll:
    name: 🔍 Poll main for changes
    runs-on: ubuntu-latest
    outputs:
      ai_analysis:           ${{ steps.compare.outputs.ai_analysis }}
      ai_analysis_sha:       ${{ steps.fetch.outputs.ai_analysis }}
      authentication:        ${{ steps.compare.outputs.authentication }}
      authentication_sha:    ${{ steps.fetch.outputs.authentication }}
      backend_claims:        ${{ steps.compare.outputs.backend_claims }}
      backend_claims_sha:    ${{ steps.fetch.outputs.backend_claims }}
      backend_notifications: ${{ steps.compare.outputs.backend_notifications }}
      backend_notifications_sha: ${{ steps.fetch.outputs.backend_notifications }}
      claims:                ${{ steps.compare.outputs.claims }}
      claims_sha:            ${{ steps.fetch.outputs.claims }}
      cost_estimation:       ${{ steps.compare.outputs.cost_estimation }}
      cost_estimation_sha:   ${{ steps.fetch.outputs.cost_estimation }}
      damage_detection:      ${{ steps.compare.outputs.damage_detection }}
      damage_detection_sha:  ${{ steps.fetch.outputs.damage_detection }}
      quality_service:       ${{ steps.compare.outputs.quality_service }}
      quality_service_sha:   ${{ steps.fetch.outputs.quality_service }}

    steps:
      - name: Restore last known SHAs from cache
        uses: actions/cache/restore@v4
        with:
          path: .last-shas
          key: last-shas-never-matches
          restore-keys: |
            last-shas-ai_analysis-
            last-shas-authentication-
            last-shas-backend_claims-
            last-shas-backend_notifications-
            last-shas-claims-
            last-shas-cost_estimation-
            last-shas-damage_detection-
            last-shas-quality_service-

      - name: Fetch current SHA per folder from main
        id: fetch
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          get_sha() {
            curl -s \
              -H "Authorization: Bearer $GH_PAT" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/commits?path=$1&sha=main&per_page=1" \
              | jq -r '.[0].sha // "none"'
          }
          echo "ai_analysis=$(get_sha backend/ai-analysis)"                       >> $GITHUB_OUTPUT
          echo "authentication=$(get_sha backend/authentication)"                 >> $GITHUB_OUTPUT
          echo "backend_claims=$(get_sha backend/backend-claims)"                 >> $GITHUB_OUTPUT
          echo "backend_notifications=$(get_sha backend/backend-notifications)"   >> $GITHUB_OUTPUT
          echo "claims=$(get_sha backend/claims)"                                  >> $GITHUB_OUTPUT
          echo "cost_estimation=$(get_sha backend/cost-estimation)"               >> $GITHUB_OUTPUT
          echo "damage_detection=$(get_sha backend/damage-detection-service)"     >> $GITHUB_OUTPUT
          echo "quality_service=$(get_sha backend/quality-service)"               >> $GITHUB_OUTPUT

      - name: Compare against cached SHAs
        id: compare
        run: |
          mkdir -p .last-shas
          read_cache() { cat ".last-shas/$1" 2>/dev/null || echo ""; }
          check() {
            local new=$2 old=$(read_cache "$1")
            if [ "$new" != "$old" ] && [ "$new" != "none" ]; then
              echo "  ↳ $1 CHANGED ($old → $new)"
              echo "$1=true"  >> $GITHUB_OUTPUT
            else
              echo "  ↳ $1 unchanged"
              echo "$1=false" >> $GITHUB_OUTPUT
            fi
          }
          echo "Checking for changes on main..."
          check "ai_analysis"           "${{ steps.fetch.outputs.ai_analysis }}"
          check "authentication"        "${{ steps.fetch.outputs.authentication }}"
          check "backend_claims"        "${{ steps.fetch.outputs.backend_claims }}"
          check "backend_notifications" "${{ steps.fetch.outputs.backend_notifications }}"
          check "claims"                "${{ steps.fetch.outputs.claims }}"
          check "cost_estimation"       "${{ steps.fetch.outputs.cost_estimation }}"
          check "damage_detection"      "${{ steps.fetch.outputs.damage_detection }}"
          check "quality_service"       "${{ steps.fetch.outputs.quality_service }}"



  # MODULE 1 - ai-analysis  (Python Flask | port 5000)

  ai-analysis:
    name: 🤖 ai-analysis — Test & Build
    runs-on: ubuntu-latest
    needs: poll
    if: needs.poll.outputs.ai_analysis == 'true' || github.event.inputs.run_ai_analysis == 'true'
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout cicd branch (Dockerfiles)
        uses: actions/checkout@v4
        with:
          ref: cicd
          path: cicd

      - name: Copy Dockerfile into backend folder
        run: cp cicd/dockerfiles/ai-analysis/Dockerfile main/backend/ai-analysis/Dockerfile

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: main/ai-analysis/requirements.txt

      - name: Install dependencies
        working-directory: main/backend/ai-analysis
        run: pip install -r requirements.txt

      - name: Lint with flake8
        working-directory: main/backend/ai-analysis
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests
        working-directory: main/ai-analysis
        env:
          FLASK_ENV: testing
        run: pip install pytest && pytest tests/ -v --tb=short

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Download model weights
        run: |
          mkdir -p main/ai-analysis/models
          curl -L "${{ secrets.MODEL_WEIGHTS_URL }}" -o main/ai-analysis/models/model.pt

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./main/ai-analysis
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ava-ai-analysis:latest

      # ✅ Only save SHA after successful build — failed builds retry next poll
      - name: Save SHA to cache
        uses: actions/cache/save@v4
        with:
          path: .last-shas
          key: last-shas-ai_analysis-${{ needs.poll.outputs.ai_analysis_sha }}

  # ai-analysis-deploy:
  #   runs-on: ubuntu-latest
  #   needs: ai-analysis
  #   steps:
  #     - uses: appleboy/ssh-action@v1.0.3
  #       with:
  #         host: ${{ secrets.SERVER_HOST }}
  #         username: ${{ secrets.SERVER_USER }}
  #         key: ${{ secrets.SERVER_SSH_KEY }}
  #         script: |
  #           docker pull ${{ secrets.DOCKER_USERNAME }}/ava-ai-analysis:latest
  #           docker stop ava-ai-analysis 2>/dev/null || true
  #           docker rm   ava-ai-analysis 2>/dev/null || true
  #           docker run -d --name ava-ai-analysis --restart unless-stopped \
  #             -p 5000:5000 -e FLASK_ENV=production --memory="1g" \
  #             ${{ secrets.DOCKER_USERNAME }}/ava-ai-analysis:latest


  # MODULE 2 — authentication  (Node.js | port 3000)
  authentication:
    name: 🔐 authentication — Test & Build
    runs-on: ubuntu-latest
    needs: poll
    if: needs.poll.outputs.authentication == 'true' || github.event.inputs.run_authentication == 'true'
    services:
      mongodb:
        image: mongo:6
        ports: [27017:27017]
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout cicd branch (Dockerfiles)
        uses: actions/checkout@v4
        with:
          ref: cicd
          path: cicd

      - name: Copy Dockerfile
        run: cp cicd/dockerfiles/authentication/Dockerfile main/authentication/Dockerfile

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: main/authentication/package-lock.json

      - name: Install dependencies
        working-directory: main/authentication
        run: npm ci

      - name: Run tests
        working-directory: main/authentication
        env:
          NODE_ENV: test
          PORT: 3000
          MONGODB_URI: mongodb://localhost:27017/ava-auth-test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: 7d
        run: npm test

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./main/authentication
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ava-authentication:latest

      - name: Save SHA to cache
        uses: actions/cache/save@v4
        with:
          path: .last-shas
          key: last-shas-authentication-${{ needs.poll.outputs.authentication_sha }}

  # authentication-deploy:
  #   runs-on: ubuntu-latest
  #   needs: authentication
  #   steps:
  #     - uses: appleboy/ssh-action@v1.0.3
  #       with:
  #         host: ${{ secrets.SERVER_HOST }}
  #         username: ${{ secrets.SERVER_USER }}
  #         key: ${{ secrets.SERVER_SSH_KEY }}
  #         script: |
  #           docker pull ${{ secrets.DOCKER_USERNAME }}/ava-authentication:latest
  #           docker stop ava-authentication 2>/dev/null || true
  #           docker rm   ava-authentication 2>/dev/null || true
  #           docker run -d --name ava-authentication --restart unless-stopped \
  #             -p 3000:3000 -e PORT=3000 \
  #             -e MONGODB_URI="${{ secrets.MONGODB_URI_AUTH }}" \
  #             -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
  #             -e JWT_EXPIRES_IN="7d" \
  #             ${{ secrets.DOCKER_USERNAME }}/ava-authentication:latest


